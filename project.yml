name: AltitudeNow
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 jiejuefuyou. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
targets:
  AltitudeNow:
    type: application
    platform: iOS
    sources:
      - path: AltitudeNow
        excludes:
          - "Resources/StoreKitConfiguration.storekit"
          - "Resources/en.lproj"
          - "Resources/ja.lproj"
          - "Resources/zh-Hans.lproj"
          - "Resources/zh-Hant.lproj"
          - "Resources/ko.lproj"
          - "Resources/es.lproj"
          - "Resources/fr.lproj"
          - "Resources/de.lproj"
    resources:
      - path: AltitudeNow/Resources/Assets.xcassets
      - path: AltitudeNow/Resources/PrivacyInfo.xcprivacy
      - path: AltitudeNow/Resources/JapanMountains.json
      - path: AltitudeNow/Resources/en.lproj
      - path: AltitudeNow/Resources/ja.lproj
      - path: AltitudeNow/Resources/zh-Hans.lproj
      - path: AltitudeNow/Resources/zh-Hant.lproj
      - path: AltitudeNow/Resources/ko.lproj
      - path: AltitudeNow/Resources/es.lproj
      - path: AltitudeNow/Resources/fr.lproj
      - path: AltitudeNow/Resources/de.lproj
      - path: AltitudeNow/Resources/StoreKitConfiguration.storekit
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.altitudenow
        PRODUCT_NAME: AltitudeNow
        INFOPLIST_KEY_CFBundleDisplayName: AltitudeNow
        INFOPLIST_KEY_CFBundleLocalizations: "en ja zh-Hans zh-Hant ko es fr de"
        INFOPLIST_KEY_NSMotionUsageDescription: "AltitudeNow reads the device's barometric pressure sensor to compute relative altitude. No motion data leaves your device."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "AltitudeNow can write your recorded altitude data to Apple Health as workout samples so you can track elevation gain alongside your other health data."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "AltitudeNow does not currently read your Health data, but the HealthKit framework requires this declaration when the app is configured to write workout samples. We will only request read access if a future update adds analytics features that depend on it."
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
  AltitudeNowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AltitudeNowTests
    dependencies:
      - target: AltitudeNow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.altitudenow.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AltitudeNow.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AltitudeNow"
  AltitudeNowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AltitudeNowUITests
    dependencies:
      - target: AltitudeNow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.altitudenow.uitests
        TEST_TARGET_NAME: AltitudeNow
schemes:
  AltitudeNow:
    build:
      targets:
        AltitudeNow: all
        AltitudeNowTests: [test]
        AltitudeNowUITests: [test]
    test:
      config: Debug
      targets:
        - AltitudeNowTests
        - AltitudeNowUITests
    run:
      config: Debug
    archive:
      config: Release
